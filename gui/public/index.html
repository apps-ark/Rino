<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rino - Claude Code Sandbox</title>
    <link rel="stylesheet" href="/xterm/xterm.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <h1>Rino</h1>
          <span class="header-subtitle">Claude Code Sandbox</span>
        </div>
        <div class="header-right">
          <span id="status-badge" class="badge badge-unknown">Cargando...</span>
        </div>
      </header>

      <!-- Status Panel -->
      <div class="status-panel" id="status-panel">
        <div class="status-grid">
          <div class="status-item">
            <span class="status-label">Sistema</span>
            <span class="status-value" id="st-os">--</span>
          </div>
          <div class="status-item">
            <span class="status-label">Motor</span>
            <span class="status-value" id="st-tool">--</span>
          </div>
          <div class="status-item">
            <span class="status-label">Entorno</span>
            <span class="status-value" id="st-base">--</span>
          </div>
          <div class="status-item">
            <span class="status-label">Sesion</span>
            <span class="status-value" id="st-auth">--</span>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <button class="btn btn-secondary" id="btn-setup">
            Instalar entorno
          </button>
          <button class="btn btn-secondary" id="btn-login">
            Iniciar sesion
          </button>
          <div class="toolbar-separator"></div>
          <label class="mount-label" for="mount-dir">Proyecto:</label>
          <input
            type="text"
            id="mount-dir"
            class="mount-input"
            placeholder="/ruta/a/tu/proyecto (opcional)"
          />
          <button class="btn btn-secondary" id="btn-launch">
            Terminal
          </button>
          <button class="btn btn-claude" id="btn-claude">
            Claude Code
          </button>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-danger" id="btn-stop" style="display: none">
            Detener
          </button>
        </div>
      </div>

      <!-- Terminal -->
      <div class="terminal-container" id="terminal"></div>
    </div>

    <script src="/xterm/xterm.js"></script>
    <script src="/xterm/xterm-addon-fit.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
